name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=AIzaSyD0U-oXBjC-n88CGQgXN4EWZ1skhDyXMJQ
          VITE_FIREBASE_AUTH_DOMAIN=kushcloud-25cd5.firebaseapp.com
          VITE_FIREBASE_DATABASE_URL=https://kushcloud-25cd5-default-rtdb.europe-west1.firebasedatabase.app
          VITE_FIREBASE_PROJECT_ID=kushcloud-25cd5
          VITE_FIREBASE_STORAGE_BUCKET=kushcloud-25cd5.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=348700156533
          VITE_FIREBASE_APP_ID=1:348700156533:web:271b97dac290b1702f4e3c
          EOF

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kushcloud-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: kushcloud-release-unsigned-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          generate_release_notes: true
          name: KushCloud ${{ github.ref_name }}
