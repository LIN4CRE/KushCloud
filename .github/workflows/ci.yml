name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 30

      - name: Create dummy env file
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN=ci-placeholder
          VITE_FIREBASE_DATABASE_URL=https://ci-placeholder
          VITE_FIREBASE_PROJECT_ID=ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET=ci-placeholder
          VITE_FIREBASE_MESSAGING_SENDER_ID=0000000000
          VITE_FIREBASE_APP_ID=ci-placeholder
          EOF

      - name: Build
        run: npm run build

      - name: Dependency audit (production, high severity gate)
        run: npm audit --omit=dev --audit-level=high
