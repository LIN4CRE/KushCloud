name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Quality Gate & Build Pages Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint
        continue-on-error: true  # ESLint 10 tooling bug; non-blocking

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build with deployment metadata
        env:
          VITE_BUILD_TIME: ${{ github.run_id }}-${{ github.run_attempt }}
          VITE_LEADERBOARD_API_URL: ${{ vars.VITE_LEADERBOARD_API_URL }}
        run: |
          export VITE_BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          npm run build

      - name: Print deployment diagnostics
        run: |
          echo "Commit: $GITHUB_SHA"
          echo "Ref: $GITHUB_REF_NAME"
          echo "Pages base: /KushCloud/"
          find dist -maxdepth 2 -type f -printf '%p %k KB\n' | sort
          cat dist/debug.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
