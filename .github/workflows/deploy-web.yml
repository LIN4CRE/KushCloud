name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=AIzaSyD0U-oXBjC-n88CGQgXN4EWZ1skhDyXMJQ
          VITE_FIREBASE_AUTH_DOMAIN=kushcloud-25cd5.firebaseapp.com
          VITE_FIREBASE_DATABASE_URL=https://kushcloud-25cd5-default-rtdb.europe-west1.firebasedatabase.app
          VITE_FIREBASE_PROJECT_ID=kushcloud-25cd5
          VITE_FIREBASE_STORAGE_BUCKET=kushcloud-25cd5.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=348700156533
          VITE_FIREBASE_APP_ID=1:348700156533:web:271b97dac290b1702f4e3c
          EOF

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
